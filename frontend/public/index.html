<form>
  Temperature: <input id="temp"><br>
  Humidity: <input id="hum"><br>
  Rainfall: <input id="rain"><br>
  <button type="button" onclick="predict()">Predict</button>
</form>

<script>
function predict() {
  fetch("http://127.0.0.1:5000/predict-db", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      user_id: 1,
      temperature: document.getElementById("temp").value,
      humidity: document.getElementById("hum").value,
      rainfall: document.getElementById("rain").value
    })
  })
  .then(res => res.json())
  .then(data => alert("Crop: " + data.predicted_crop));
}
</script>
